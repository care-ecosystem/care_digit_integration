openapi: 3.0.3
info:
  title: CARE PGR Complaint API
  version: 1.0.0
  description: API specification for CARE ↔ DIGIT PGR complaint integration

servers:
  - url: /api/digit-integration/

paths:
  /pgr/complaint:
    post:
      summary: Create Complaint
      operationId: createComplaint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateComplaintRequest'
      responses:
        '201':
          description: Complaint created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Complaint'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      summary: List Complaints
      operationId: listComplaints
      parameters:
        - in: query
          name: facility
          schema:
            type: string
            format: uuid
        - in: query
          name: complaint_type
          schema:
            type: string
            enum: [SYSTEM, HEALTHSERVICES]
        - in: query
          name: service_code
          schema:
            type: string
        - in: query
          name: pgr_status
          schema:
            type: string
        - in: query
          name: created_after
          schema:
            type: string
            format: date-time
        - in: query
          name: created_before
          schema:
            type: string
            format: date-time
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: List of complaints
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplaintListResponse'


  /pgr/service-codes/:
    get:
      summary: List Service Codes
      operationId: listServiceCodes
      parameters:
        - in: query
          name: workflow
          schema:
            type: string
            enum: [SYSTEM, HEALTHSERVICES]
        - in: query
          name: facilityId
          schema:
            type: string
      responses:
        '200':
          description: Service codes list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceCodeListResponse'

components:
  schemas:

    CreateComplaintRequest:
      type: object
      required:
        - facility
        - complaint_type
        - service_code
        - description
      properties:
        facility:
          type: string
          format: uuid
        complaint_type:
          type: string
          enum: [SYSTEM, HEALTHSERVICES]
        service_code:
          type: string
        description:
          type: string
        additional_details:
          type: object
          additionalProperties: true

    Complaint:
      type: object
      properties:
        id:
          type: string
        facility:
          type: string
        facility_name:
          type: string
        reporter:
          type: string
        reporter_name:
          type: string
        complaint_type:
          type: string
        complaint_type_display:
          type: string
        service_code:
          type: string
        service_code_display:
          type: string
        description:
          type: string
        additional_details:
          type: object
        pgr_ticket_id:
          type: string
          nullable: true
        pgr_status:
          type: string
        pgr_status_display:
          type: string
        created_date:
          type: string
          format: date-time
        modified_date:
          type: string
          format: date-time

    ComplaintListResponse:
      type: object
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/Complaint'

    ComplaintDetail:
      allOf:
        - $ref: '#/components/schemas/Complaint'
        - type: object
          properties:
            pgr_tenant_id:
              type: string
            pgr_last_synced_at:
              type: string
              format: date-time
            pgr_response:
              type: object
              properties:
                serviceRequestId:
                  type: string
                applicationStatus:
                  type: string
                assignee:
                  type: object
                  properties:
                    name:
                      type: string
                    designation:
                      type: string
            sync_attempts:
              type: integer
            last_sync_error:
              type: string
              nullable: true

    ServiceCode:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        workflow:
          type: string

    ServiceCodeListResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ServiceCode'

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              detail:
                type: object

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              detail:
                type: string

    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
              detail:
                type: string
